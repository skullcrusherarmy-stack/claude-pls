<!DOCTYPE html>
<html>
<head>
  <title>Smart Garbage Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; }
    #map { height: 100vh; }

    #panel {
      position: absolute; top: 10px; right: 10px; z-index: 1000;
      background: white; border-radius: 12px; padding: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.15); min-width: 240px;
    }

    #distance { font-size: 13px; font-weight: 600; color: #1a73e8; margin-top: 8px; }
    .step { font-size: 11px; padding: 4px 0; border-bottom: 1px solid #eee; }
  </style>
</head>

<body>

<div id="map"></div>

<div id="panel">
  <h3>Smart Routing</h3>
  <div id="distance"></div>
  <div id="steps"></div>
</div>

<script>
const API = 'https://claude-pls.onrender.com';

const map = L.map('map').setView([12.84, 79.15], 15);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// Icons
const icons = {
  truck: L.divIcon({ html: '<div style="background:blue;width:16px;height:16px;border-radius:50%;border:2px solid white"></div>' }),
  bin: L.divIcon({ html: '<div style="background:green;width:16px;height:16px;border-radius:50%;border:2px solid white"></div>' })
};

let markers = {};
let positions = {};   // ✅ FIXED
let types = {};
let routeLine = null;
let hasFitted = false;

// 🔄 Fetch backend data
async function fetchLocations() {
  try {
    const res = await fetch(API + '/locations');
    const data = await res.json();

    Object.keys(data).forEach(id => {
      const item = data[id];
      if (!item || !item.type) return;

      const { lat, lng, type } = item;
      const position = [lat, lng];

      positions[id] = position;
      types[id] = type;

      if (!markers[id]) {
        markers[id] = L.marker(position, {
          icon: icons[type] || icons.bin
        }).addTo(map)
        .bindPopup(`${type}: ${id}`);
      } else {
        markers[id].setLatLng(position);
      }
    });

    const all = Object.values(positions);
    if (all.length > 0 && !hasFitted) {
      map.fitBounds(all, { padding: [60, 60] });
      hasFitted = true;
    }

  } catch (e) {
    console.error(e);
  }
}

// 🚚 Laptop GPS → truck
function sendTruckLocation() {
  navigator.geolocation.getCurrentPosition(async (pos) => {
    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;

    await fetch(API + '/location', {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        deviceId: "truck1",
        type: "truck",
        lat,
        lng
      })
    });
  });
}

// 🧠 Smart routing
async function getRoute() {
  let truck = null;

  Object.keys(types).forEach(id => {
    if (types[id] === "truck") {
      truck = positions[id];
    }
  });

  if (!truck) return;

  let nearest = null;
  let minDist = Infinity;

  Object.keys(positions).forEach(id => {
    if (types[id] === "truck") return;

    const pos = positions[id];
    if (!pos) return;

    const dist = Math.hypot(
      truck[0] - pos[0],
      truck[1] - pos[1]
    );

    if (dist < minDist) {
      minDist = dist;
      nearest = pos;
    }
  });

  if (!nearest) return;

  const [lat1, lng1] = truck;
  const [lat2, lng2] = nearest;

  const url = `https://router.project-osrm.org/route/v1/driving/` +
    `${lng1},${lat1};${lng2},${lat2}?overview=full&geometries=geojson&steps=true`;

  try {
    const res = await fetch(url);
    const data = await res.json();
    const route = data.routes[0];
    if (!route) return;

    if (routeLine) map.removeLayer(routeLine);

    routeLine = L.geoJSON(route.geometry, {
      style: { color: '#1a73e8', weight: 5 }
    }).addTo(map);

    const km = (route.distance / 1000).toFixed(1);
    const min = Math.round(route.duration / 60);

    document.getElementById('distance').textContent =
      `${km} km · ~${min} min`;

    const steps = route.legs[0].steps;
    document.getElementById('steps').innerHTML =
      steps.map(s => `<div class="step">→ ${s.name || 'Continue'}</div>`).join('');

  } catch (e) {
    console.error(e);
  }
}

// 🔄 Loops
fetchLocations();
setInterval(fetchLocations, 2000);
setInterval(sendTruckLocation, 5000);
setInterval(getRoute, 5000);

</script>

</body>
</html>
